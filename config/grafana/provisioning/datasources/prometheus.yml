apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: OpenSearch
    type: grafana-opensearch-datasource
    uid: P9744FCCEAAFBD98F
    access: proxy
    url: http://opensearch:9200
    editable: true
    jsonData:
      database: "*"
      #timeField: "@timestamp"
      flavor: opensearch
      logLevelField: level
      logMessageField: message
      maxConcurrentShardRequests: 5
      pplEnabled: true
      tlsSkipVerify: true
      version: "2.18.0"
